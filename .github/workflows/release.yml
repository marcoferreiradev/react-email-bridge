name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Permissions needed by changesets/action to open the Version Packages PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Disable Husky for the entire job. In CI we rely on the dedicated
    # steps below (typecheck/build/test) AND CI is itself the gate, so
    # there is no reason to also fire the pre-commit / pre-push hooks.
    #
    # Concrete bug it fixes: changesets/action does `git push` to push
    # the release commit + tags. Without HUSKY=0 that push triggers
    # `.husky/pre-push`, which runs `pnpm build` IN PARALLEL with this
    # job's "Build packages" step. Both invocations race on the same
    # .next/ directory; the second one fails with "Another next build
    # process is already running". The publish itself succeeds before
    # the race, but the workflow ends red, which is misleading.
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so changesets can compute the right bump.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all workspace packages in topological order BEFORE publish.
      # Required because react-email-bridge-ui's `next build` imports from
      # `react-email-bridge/hbs` and needs that package's dist/ to exist.
      # Running prepublishOnly per-package would re-trigger the build in
      # whichever order changesets picks, which can race; doing it at the
      # workspace root with `pnpm -r` is deterministic.
      - name: Build packages
        run: pnpm build

      # Opens (or updates) a "Version Packages" PR when pending changesets
      # exist on main. Merging that PR bumps versions + writes CHANGELOG.md.
      # The same step then runs `pnpm changeset publish` which pushes the
      # newly-versioned packages to npm using NPM_TOKEN (set in repo Secrets;
      # see SECURITY.md / CONTRIBUTING.md).
      - name: Create Version Packages PR / publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
