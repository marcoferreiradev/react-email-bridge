name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (workspace root)
        run: pnpm typecheck

      - name: Validate pipeline (P0 stress test)
        run: pnpm validate

      - name: Build packages
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Smoke export — generic-hbs example
        run: |
          cd examples/generic-hbs
          node ../../packages/react-email-bridge/dist/cli/index.mjs export --all
          test -f dist/order-summary.hbs
          grep -q "{{customer.firstName}}" dist/order-summary.hbs

      - name: Smoke export — vtex-store example
        run: |
          cd examples/vtex-store
          node ../../packages/react-email-bridge/dist/cli/index.mjs export --all
          test -f dist/order-confirmed.hbs
          test -f dist/order-invoiced.hbs
          grep -q "{{#richShippingData shippingData}}" dist/order-confirmed.hbs
          grep -q "{{#each ../../../../items}}" dist/order-invoiced.hbs

      - name: Smoke new-project bootstrap (generic-hbs + vtex-store)
        # After ADR-0001 (examples-as-starter), new-project copies from
        # examples/<name> and rewrites the package.json for a standalone
        # project. --skip-install avoids fetching from npm (the bumped
        # version may not be published yet at CI time).
        run: |
          # generic-hbs (default template)
          node scripts/new-project.mjs /tmp/ci-generic --template generic-hbs --skip-install
          test -f /tmp/ci-generic/emails/order-summary.tsx
          test -f /tmp/ci-generic/package.json
          test -f /tmp/ci-generic/tsconfig.json
          test -f /tmp/ci-generic/.npmrc
          test -f /tmp/ci-generic/react-email-bridge.config.ts
          test -f /tmp/ci-generic/README.md
          grep -q '"react-email-bridge": "\^' /tmp/ci-generic/package.json
          ! test -e /tmp/ci-generic/CHANGELOG.md
          ! test -e /tmp/ci-generic/vendor

          # vtex-store
          node scripts/new-project.mjs /tmp/ci-vtex --template vtex-store --skip-install
          test -f /tmp/ci-vtex/emails/order-confirmed.tsx
          test -d /tmp/ci-vtex/components
          test -f /tmp/ci-vtex/tailwind.config.ts
          test -f /tmp/ci-vtex/package.json
          grep -q '"tailwindcss"' /tmp/ci-vtex/package.json
