version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      runtime-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # The forked Next.js preview server has tight version coupling;
      # upgrade via the VENDORING.md rebase process, not via Dependabot.
      - dependency-name: "next"
      - dependency-name: "react"
      - dependency-name: "react-dom"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
